<!DOCTYPE html>
<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>SORE - Aggiungi Ricordo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-blue: #007AFF;
            --ios-divider: #C6C6C8;
            --ios-nav-bg: rgba(255, 255, 255, 0.85);
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            -webkit-tap-highlight-color: transparent;
        }.toggle-slider {
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }.hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F2F2F7] min-h-screen pb-32">
<div class="pt-14 px-5 flex justify-between items-center mb-6">
<h1 class="text-4xl font-bold tracking-tight text-black">Aggiungi</h1>
<div class="h-10 w-10 rounded-full overflow-hidden border border-gray-200 shadow-sm">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXn1RUXA6gZODNBGIduPpLx9MSxtQR4_XJ-XbJE2xW_5os7qs-FpqcXgWUNS1SEzcUq9MG1ZBv7Q2w1vfS7mcX0UE3NLFm8LZbKQIwSWIrZjSGaF0zJH1fFjJa8_CXXqmGno9c439ldNqnj3HYaypYHWCUDctRrhANVbwnKpQ2qXJKVIMQbIyw9iiFYJ28aiWXUNmfV04L21qS0oMP1jcODKw-YDa8vc8zmWDV912VjX8VyXF8xaUSDomkNSsPqUDL43ofekLNtjON"/>
</div>
</div>
<main class="px-4">
<div class="bg-[#E3E3E8] p-1 rounded-xl flex mb-8 relative">
<div class="absolute left-1 top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-lg shadow-sm toggle-slider"></div>
<button class="flex-1 relative z-10 py-1.5 text-sm font-semibold text-center text-black">Ricordo</button>
<button class="flex-1 relative z-10 py-1.5 text-sm font-semibold text-center text-gray-500">Idea</button>
</div>
<div class="flex flex-col gap-6">
<div class="flex gap-3 overflow-x-auto hide-scrollbar py-1">
<button class="flex-none px-4 py-1.5 rounded-full bg-black text-white text-[13px] font-medium transition-transform active:scale-95">
                    Semplice
                </button>
<button class="flex-none px-4 py-1.5 rounded-full bg-white text-gray-500 border border-gray-200 text-[13px] font-medium transition-transform active:scale-95">
                    Evento
                </button>
<button class="flex-none px-4 py-1.5 rounded-full bg-white text-gray-500 border border-gray-200 text-[13px] font-medium transition-transform active:scale-95">
                    Viaggio
                </button>
<button class="flex-none px-4 py-1.5 rounded-full bg-white text-gray-500 border border-gray-200 text-[13px] font-medium transition-transform active:scale-95">
                    Futuro
                </button>
</div>
<div class="bg-white rounded-2xl p-4 shadow-[0_1px_2px_rgba(0,0,0,0.03)]">
<label class="block text-xs font-medium text-gray-400 uppercase mb-1 ml-1">Titolo</label>
<input class="w-full text-lg font-semibold placeholder-gray-300 border-none p-0 focus:ring-0 text-black bg-transparent" placeholder="Che ricordo è?" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="bg-white rounded-2xl p-4 flex flex-col justify-between h-24 shadow-[0_1px_2px_rgba(0,0,0,0.03)] active:bg-gray-50 transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-500 group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
</div>
<span class="text-[15px] font-medium text-gray-900">Oggi</span>
</button>
<button class="bg-white rounded-2xl p-4 flex flex-col justify-between h-24 shadow-[0_1px_2px_rgba(0,0,0,0.03)] active:bg-gray-50 transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px] fill-1">location_on</span>
</div>
<span class="text-[15px] font-medium text-gray-400 truncate">Aggiungi luogo</span>
</button>
</div>
<div class="bg-white rounded-2xl p-4 flex items-center gap-3 shadow-[0_1px_2px_rgba(0,0,0,0.03)]">
<div class="w-8 h-8 rounded-full bg-[#1DB954] flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-white text-[18px]">music_note</span>
</div>
<input class="flex-1 text-[15px] border-none p-0 focus:ring-0 placeholder-gray-400 bg-transparent" placeholder="Incolla link Spotify..." type="text"/>
</div>
<div class="relative w-full aspect-square bg-white rounded-3xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center gap-3 overflow-hidden active:bg-gray-50 transition-colors group cursor-pointer">
<div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center group-active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-4xl text-gray-400">add_a_photo</span>
</div>
<span class="text-sm font-medium text-gray-400">Tocca per aggiungere foto</span>
<input accept="image/*" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer" multiple="" type="file"/>
</div>
</div>
</main>
<div class="fixed bottom-8 left-0 right-0 px-6 flex items-end justify-between z-50 pointer-events-none">
<div class="bg-black text-white h-[60px] px-2 rounded-[30px] flex items-center shadow-2xl pointer-events-auto mx-auto backdrop-blur-md">
<nav class="flex items-center h-full relative">
<a class="w-14 h-full flex items-center justify-center text-gray-400 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">home</span>
</a>
<a class="w-14 h-full flex items-center justify-center text-gray-400 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">grid_view</span>
</a>
<a class="h-[44px] px-5 mx-1 bg-white/20 rounded-[22px] flex items-center justify-center gap-2 text-white transition-all" href="#">
<span class="material-symbols-outlined text-[24px]">add_circle</span>
<span class="text-[13px] font-bold">Aggiungi</span>
</a>
<a class="w-14 h-full flex items-center justify-center text-gray-400 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">map</span>
</a>
<a class="w-14 h-full flex items-center justify-center text-gray-400 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">person</span>
</a>
</nav>
</div>
<div class="absolute right-6 bottom-1 pointer-events-auto">
<button class="w-[52px] h-[52px] bg-blue-500 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform active:bg-blue-600 text-white">
<span class="material-symbols-outlined text-[24px] translate-x-0.5 -translate-y-0.5">arrow_upward</span>
</button>
</div>
</div>

</body></html>
